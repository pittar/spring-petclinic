trigger: none

resources:
  repositories:
    - repository: petclinic
      type: github
      name: pittar/spring-petclinic
ref: refs/heads/main

variables:
  IMAGE_REPOSITORY: pittar/petclinic
  IMAGE_TAG: ado

pool:
  vmImage: ubuntu-latest

stages:
  - stage: BuildAndPush
    displayName: Build and Push
    jobs:
      - job: BuildJob
        displayName: Maven Build and Container Push
        steps:
          - checkout: petclinic

          - task: Maven@3
            displayName: Build with Maven
            inputs:
              mavenPomFile: pom.xml
              goals: package
              options: -DskipTests
              publishJUnitResults: false

          - task: Docker@2
            displayName: Build and Push to quay.io
            inputs:
              command: buildAndPush
              containerRegistry: quay-service-connection
              repository: $(IMAGE_REPOSITORY)
              dockerfile: Containerfile
              tags: $(IMAGE_TAG)
